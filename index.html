<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild Puzzle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
margin:0;
}

#controls{
margin:20px;
}

button,select,input{
padding:8px;
font-size:16px;
margin:5px;
border:none;
border-radius:6px;
}

button{
background:#ff9800;
color:white;
cursor:pointer;
}

#puzzle{
position:relative;
width:360px;
height:360px;
margin:auto;
background:black;
touch-action:none;
}

.tile{
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
text-shadow:1px 1px 3px black;

background-size:360px 360px;

transition:transform .25s;

-webkit-tap-highlight-color:transparent;
user-select:none;
}

.empty{
display:none;
}

</style>
</head>

<body>

<h1>🧩 Bild Puzzle</h1>

<div id="controls">

Größe:

<select id="size">
<option value="3">3x3</option>
<option value="4" selected>4x4</option>
<option value="5">5x5</option>
</select>

<button onclick="startGame()">Neu starten</button>

<br>

Bild hochladen:
<input type="file" id="imgUpload" accept="image/*">

<p>⏱ Zeit: <span id="timer">0</span></p>

</div>

<div id="puzzle"></div>

<script>

let size
let tiles=[]
let tileElements=[]
let emptyIndex
let imgSrc="IMG_2806.png"

let timer=0
let timerInterval

let puzzle=document.getElementById("puzzle")
let timerText=document.getElementById("timer")

document.getElementById("imgUpload").addEventListener("change",e=>{

let file=e.target.files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(ev){

imgSrc=ev.target.result
createTiles()

}

reader.readAsDataURL(file)

})

function startGame(){

size=parseInt(document.getElementById("size").value)

tiles=[]

for(let i=1;i<size*size;i++) tiles.push(i)

tiles.push("")

emptyIndex=tiles.length-1

shuffle()

timer=0
timerText.innerText=0

clearInterval(timerInterval)

timerInterval=setInterval(()=>{

timer++
timerText.innerText=timer

},1000)

createTiles()

}

function shuffle(){

for(let i=0;i<200;i++){

let row=Math.floor(emptyIndex/size)
let col=emptyIndex%size

let moves=[]

if(row>0) moves.push(emptyIndex-size)
if(row<size-1) moves.push(emptyIndex+size)
if(col>0) moves.push(emptyIndex-1)
if(col<size-1) moves.push(emptyIndex+1)

let target=moves[Math.floor(Math.random()*moves.length)]

swap(target)

}

}

function swap(i){

tiles[emptyIndex]=tiles[i]
tiles[i]=""

emptyIndex=i

}

function createTiles(){

puzzle.innerHTML=""
tileElements=[]

let tileSize=360/size

for(let i=0;i<tiles.length;i++){

let value=tiles[i]

let tile=document.createElement("div")

tile.className="tile"

tile.style.width=tileSize+"px"
tile.style.height=tileSize+"px"

if(value===""){

tile.classList.add("empty")

}else{

tile.innerText=value

tile.style.fontSize=(tileSize/3)+"px"

let imgRow=Math.floor((value-1)/size)
let imgCol=(value-1)%size

tile.style.backgroundImage="url("+imgSrc+")"

tile.style.backgroundPosition=
(-imgCol*tileSize)+"px "+(-imgRow*tileSize)+"px"

tile.addEventListener("pointerdown",()=>move(i))

}

puzzle.appendChild(tile)

tileElements.push(tile)

}

updatePositions()

}

function updatePositions(){

let tileSize=360/size

for(let i=0;i<tiles.length;i++){

let row=Math.floor(i/size)
let col=i%size

tileElements[i].style.transform=
"translate("+(col*tileSize)+"px,"+(row*tileSize)+"px)"

}

}

function move(index){

let row=Math.floor(index/size)
let col=index%size

let erow=Math.floor(emptyIndex/size)
let ecol=emptyIndex%size

if(row===erow || col===ecol){

while(index!==emptyIndex){

let next

if(row===erow){

next=index+(ecol>col?1:-1)

}else{

next=index+(erow>row?size:-size)

}

tiles[emptyIndex]=tiles[next]
tiles[next]=""

emptyIndex=next

}

updatePositions()

}

}

startGame()

</script>

</body>
</html>
