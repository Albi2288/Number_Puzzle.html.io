<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Number Puzzle</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

h1{
    margin-top:30px;
}

#puzzle{
    width:300px;
    height:300px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:5px;
}

.tile{
    background:#4CAF50;
    color:white;
    font-size:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-radius:10px;
}

.empty{
    background:#ddd;
    cursor:default;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    background:#2196F3;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Number Puzzle</h1>
<p>Ordne die Zahlen von 1 bis 8!</p>

<div id="puzzle"></div>

<button onclick="shuffle()">Neu mischen</button>

<script>

let puzzle = document.getElementById("puzzle");
let tiles = [1,2,3,4,5,6,7,8,""];

function render(){
    puzzle.innerHTML="";

    tiles.forEach((num,index)=>{
        let div=document.createElement("div");

        if(num===""){
            div.className="tile empty";
        }else{
            div.className="tile";
            div.innerText=num;
            div.onclick=()=>move(index);
        }

        puzzle.appendChild(div);
    });
}

function move(i){

    let emptyIndex = tiles.indexOf("");

    let validMoves=[
        i-1,i+1,i-3,i+3
    ];

    if(validMoves.includes(emptyIndex)){
        [tiles[i],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[i]];
        render();
        checkWin();
    }
}

function shuffle(){
    tiles.sort(()=>Math.random()-0.5);
    render();
}

function checkWin(){
    let win=[1,2,3,4,5,6,7,8,""];
    if(JSON.stringify(tiles)===JSON.stringify(win)){
        setTimeout(()=>alert("Gewonnen! 🎉"),100);
    }
}

render();

</script>

</body>
</html>
