<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild Puzzle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

#controls{
margin:20px;
}

button,select{
padding:8px;
font-size:16px;
margin:5px;
border:none;
border-radius:6px;
}

button{
background:#ff9800;
color:white;
cursor:pointer;
}

#puzzle{
position:relative;
width:360px;
height:360px;
margin:auto;
background:black;
touch-action:none;
}

.tile{
position:absolute;
background-size:360px 360px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
text-shadow:1px 1px 3px black;
transition:0.25s;
}

.empty{
background:none;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🧩 Bild Puzzle</h1>

<div id="controls">

Größe:
<select id="size">
<option value="3">3x3</option>
<option value="4" selected>4x4</option>
<option value="5">5x5</option>
<option value="6">6x6</option>
</select>

<button onclick="startGame()">Neu starten</button>

<p>⏱ Zeit: <span id="timer">0</span></p>

</div>

<div id="puzzle"></div>

<canvas id="confetti"></canvas>

<script>

let size
let tiles=[]
let timer=0
let timerInterval

const puzzle=document.getElementById("puzzle")
const timerText=document.getElementById("timer")

const image="IMG_2806.png"



function startGame(){

size=parseInt(document.getElementById("size").value)

tiles=[]

for(let i=1;i<size*size;i++){
tiles.push(i)
}

tiles.push("")

shuffle()

timer=0
timerText.innerText=0

clearInterval(timerInterval)

timerInterval=setInterval(()=>{
timer++
timerText.innerText=timer
},1000)

draw()

}



function shuffle(){

let moves = 200

for(let i=0;i<moves;i++){

let empty=tiles.indexOf("")

let possible=[]

let row=Math.floor(empty/size)
let col=empty%size

if(row>0) possible.push(empty-size)
if(row<size-1) possible.push(empty+size)
if(col>0) possible.push(empty-1)
if(col<size-1) possible.push(empty+1)

let target=possible[Math.floor(Math.random()*possible.length)]

let temp=tiles[target]
tiles[target]=tiles[empty]
tiles[empty]=temp

}

}




function draw(){

puzzle.innerHTML=""

let tileSize=360/size

for(let i=0;i<tiles.length;i++){

let value=tiles[i]

let div=document.createElement("div")

let row=Math.floor(i/size)
let col=i%size

div.style.width=tileSize+"px"
div.style.height=tileSize+"px"

div.style.left=(col*tileSize)+"px"
div.style.top=(row*tileSize)+"px"

if(value===""){

div.className="tile empty"

}else{

div.className="tile"

div.innerText=value

div.style.fontSize=(tileSize/3)+"px"

let imgRow=Math.floor((value-1)/size)
let imgCol=(value-1)%size

div.style.backgroundImage="url("+image+")"

div.style.backgroundPosition=
(-imgCol*tileSize)+"px "+
(-imgRow*tileSize)+"px"

div.onclick=()=>move(i)

}

puzzle.appendChild(div)

}

}



function move(i){

let empty=tiles.indexOf("")

let row=Math.floor(i/size)
let col=i%size

let erow=Math.floor(empty/size)
let ecol=empty%size

let dist=Math.abs(row-erow)+Math.abs(col-ecol)

if(dist===1){

let temp=tiles[i]
tiles[i]=tiles[empty]
tiles[empty]=temp

draw()

checkWin()

}

}



function checkWin(){

for(let i=0;i<tiles.length-1;i++){

if(tiles[i]!==i+1) return

}

clearInterval(timerInterval)

startConfetti()

setTimeout(()=>{
alert("🎉 Puzzle gelöst! Zeit: "+timer+" Sekunden")
},200)

}



let startX,startY



puzzle.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX
startY=e.touches[0].clientY

})



puzzle.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

let empty=tiles.indexOf("")

let target

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30) target=empty-1
else if(dx<-30) target=empty+1

}else{

if(dy>30) target=empty-size
else if(dy<-30) target=empty+size

}

if(target>=0 && target<tiles.length){

move(target)

}

})



const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

let particles=[]

function startConfetti(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

particles=[]

for(let i=0;i<150;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

size:Math.random()*8+4,

speed:Math.random()*3+2,

color:`hsl(${Math.random()*360},100%,50%)`

})

}

animateConfetti()

}



function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.y+=p.speed

ctx.fillStyle=p.color

ctx.fillRect(p.x,p.y,p.size,p.size)

})

particles=particles.filter(p=>p.y<canvas.height)

if(particles.length>0){

requestAnimationFrame(animateConfetti)

}

}



startGame()

</script>

</body>
</html>
